# Infra-only Compose for contributors who run API/Celery on the host (see README).
# Full stacks: docker-compose.dev.yml (hot reload) and docker-compose.prod.yml (built images).

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dharmiq
      POSTGRES_PASSWORD: dharmiq
      POSTGRES_DB: dharmiq
    ports:
      - "5433:5432"
    volumes:
      - dharmiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dharmiq -d dharmiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - dharmiq_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    command: celery flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_UNAUTHENTICATED_API: "true"
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  dharmiq_pgdata:
  dharmiq_redis:
