services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dharmiq
      POSTGRES_PASSWORD: dharmiq
      POSTGRES_DB: dharmiq
    ports:
      - "5433:5432"
    volumes:
      - dharmiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dharmiq -d dharmiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dharmiq_pgdata:
