# Dharmiq MVP corpus allowlist (v0.5)
#
# Central IndiaCode instruments for the three MVP domains. Use this file to:
#   1. Download PDFs via indian-law-dataset-scraper (filter by instrument_id or handle)
#   2. Build manifest.json entries for data/corpus/india_code/raw/
#   3. Scope eval datasets (each JSONL should assume these source_id values are indexed)
#
# Source metadata: indian-law-dataset-scraper dist/csv/instruments.csv (2026-06-22)
# Self-host: copy PDFs into data/corpus/india_code/raw/ then run sync_india_code_pdfs
#
# Related: docs/plans/v0.5/prd.md · docs/plans/data-implementation.md

version: "1"
updated: "2026-06-22"
jurisdiction_default: central

