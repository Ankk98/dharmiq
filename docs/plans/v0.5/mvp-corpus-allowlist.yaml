scraper_workflow: |
  # From indian-law-dataset-scraper repo:
  indiacode init
  indiacode metadata --scope central
  # Download by instrument_id list or re-run download for central scope then filter PDFs
  indiacode download --scope central --extract-text --resume

  # Copy matching PDFs to dharmiq data/corpus/india_code/raw/
  # Emit manifest.json using `id`, `title`, `doc_type`, `jurisdiction`, `canonical_url`

manifest_example:
  file: consumer-protection-act-2019.pdf
  source_id: IN-CPA-2019
  title: The Consumer Protection Act, 2019
  doc_type: act
  jurisdiction: central
  enactment_date: "2019-08-09"
  canonical_url: https://www.indiacode.nic.in/handle/123456789/15256

